<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080603" />
    <meta name="description" content="A quiet space for when your thoughts won't stop at 2am. Private, anonymous, no account needed." />

    <!-- Open Graph -->
    <meta property="og:title" content="2am — a quiet space for sleepless nights" />
    <meta property="og:description" content="When your thoughts won't stop. Private, anonymous, nothing saved." />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="2am" />
    <meta name="twitter:description" content="A quiet space for when your thoughts won't stop at night." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

    <title>2am</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        background: #080603;
        color: #e8d8b0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::selection { background: #c8a96e33; color: #e8d8b0; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2010; border-radius: 2px; }
      textarea::placeholder { color: #3a2a10; }
      button { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
